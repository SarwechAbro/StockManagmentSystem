<!DOCTYPE html>
<html>
<head>
    <style>
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.2);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(1200deg);
            }
        }
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            align-items: center;
            justify-content: center;
            {% comment %} /  padding-top: 50px; {% endcomment %}
            margin: 0;
        }
        h1 {
            display : flex;
            justify-content: center;
            align-items: center;
            background-color: rgb(11, 128, 28);
            color: white;
            padding: 20px;
            
            border-radius: 10px;
            transform-origin: center;
            animation: fadeIn 2s ease-in-out, spin 1s linear;
        }
        p{
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 18px;
            margin: 10px 0;
            text-align: center;
            animation: fadeIn 2s ease-in-out;
        }
    </style>
</head>
<body>
    <h1>Fuck You {{ username }}</h1>
    <P>Welcome to the FUCKING world! </P>
    <P>Created by Sarwech Abro</P>
</body>
</html>
